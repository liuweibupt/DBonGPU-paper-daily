<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GPU 数据库论文日报 - 2026-05-27</title>
    <style>
        :root {
            --bg: #0a0e17;
            --bg-secondary: #111827;
            --card-bg: #151d2e;
            --card-hover: #1a2540;
            --border: #1e2d4a;
            --border-hover: #2d4a7a;
            --text: #e2e8f0;
            --text-secondary: #8892a8;
            --text-dim: #5a6480;
            --accent: #60a5fa;
            --accent-bright: #93c5fd;
            --accent-green: #34d399;
            --accent-orange: #fbbf24;
            --accent-red: #f87171;
            --accent-purple: #a78bfa;
            --gradient-1: linear-gradient(135deg, #60a5fa, #34d399);
            --gradient-2: linear-gradient(135deg, #60a5fa, #a78bfa);
            --shadow: 0 4px 24px rgba(0,0,0,0.3);
            --shadow-hover: 0 8px 32px rgba(0,0,0,0.4);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', Helvetica, Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            min-height: 100vh;
        }

        /* Top Navigation */
        .top-nav {
            position: sticky;
            top: 0;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 24px;
            background: rgba(10,14,23,0.85);
            backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--border);
        }
        .nav-brand {
            font-weight: 700;
            font-size: 1.1em;
            color: var(--accent);
        }
        .nav-links {
            display: flex;
            gap: 8px;
        }
        .nav-links a {
            color: var(--text-secondary);
            text-decoration: none;
            padding: 6px 16px;
            border-radius: 8px;
            font-size: 0.9em;
            transition: all 0.2s;
        }
        .nav-links a:hover {
            color: var(--text);
            background: rgba(96,165,250,0.1);
        }
        .nav-links a.active {
            color: var(--accent);
            background: rgba(96,165,250,0.15);
        }

        /* Hero */
        .hero {
            text-align: center;
            padding: 60px 24px 30px;
            max-width: 800px;
            margin: 0 auto;
        }
        .hero h1 {
            font-size: 2.4em;
            font-weight: 800;
            background: var(--gradient-1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 12px;
            letter-spacing: -0.02em;
        }
        .hero-desc {
            color: var(--text-secondary);
            font-size: 1.15em;
            margin-bottom: 16px;
        }
        .hero-date {
            display: inline-block;
            background: rgba(96,165,250,0.12);
            color: var(--accent-bright);
            padding: 6px 20px;
            border-radius: 20px;
            font-weight: 600;
            font-size: 1.1em;
            border: 1px solid rgba(96,165,250,0.2);
        }

        /* Date Navigation */
        .date-nav {
            display: flex;
            gap: 8px;
            justify-content: center;
            flex-wrap: wrap;
            padding: 0 24px;
            margin-bottom: 30px;
        }
        .date-nav a {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 6px 16px;
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 0.88em;
            transition: all 0.2s;
        }
        .date-nav a:hover {
            border-color: var(--accent);
            color: var(--accent);
            background: rgba(96,165,250,0.08);
        }
        .date-nav a.active {
            border-color: var(--accent);
            color: var(--accent);
            background: rgba(96,165,250,0.15);
            font-weight: 600;
        }

        /* Stats */
        .stats-row {
            display: flex;
            gap: 16px;
            justify-content: center;
            margin: 0 auto 36px;
            padding: 0 24px;
            flex-wrap: wrap;
            max-width: 800px;
        }
        .stat-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 16px 28px;
            text-align: center;
            min-width: 120px;
            transition: border-color 0.2s;
        }
        .stat-card:hover {
            border-color: var(--border-hover);
        }
        .stat-value {
            font-size: 1.5em;
            font-weight: 700;
            background: var(--gradient-1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .stat-label {
            font-size: 0.82em;
            color: var(--text-dim);
            margin-top: 4px;
        }

        /* Paper List */
        .paper-list {
            max-width: 860px;
            margin: 0 auto;
            padding: 0 24px;
        }

        /* Paper Card */
        .paper-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 24px;
            margin-bottom: 16px;
            transition: all 0.25s ease;
            position: relative;
        }
        .paper-card:hover {
            border-color: var(--border-hover);
            background: var(--card-hover);
            box-shadow: var(--shadow-hover);
            transform: translateY(-2px);
        }
        .paper-card.compact {
            padding: 18px 22px;
        }

        .paper-header {
            display: flex;
            align-items: flex-start;
            gap: 12px;
        }
        .paper-rank {
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 34px;
            height: 34px;
            border-radius: 10px;
            font-weight: 700;
            font-size: 0.9em;
            color: #fff;
            background: var(--gradient-1);
        }
        .compact .paper-rank {
            width: 28px;
            height: 28px;
            font-size: 0.8em;
            border-radius: 8px;
        }
        .paper-title {
            font-size: 1.12em;
            font-weight: 600;
            line-height: 1.5;
        }
        .compact .paper-title {
            font-size: 1.0em;
        }
        .paper-title a {
            color: var(--text);
            text-decoration: none;
            transition: color 0.2s;
        }
        .paper-title a:hover {
            color: var(--accent);
        }

        .paper-meta {
            margin-top: 10px;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            align-items: center;
        }
        .score-badge {
            display: inline-flex;
            align-items: center;
            padding: 3px 10px;
            border-radius: 6px;
            font-size: 0.82em;
            font-weight: 600;
        }
        .score-high { background: rgba(52,211,153,0.12); color: var(--accent-green); }
        .score-mid { background: rgba(251,191,36,0.12); color: var(--accent-orange); }
        .score-low { background: rgba(90,100,128,0.15); color: var(--text-dim); }

        .tag {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 5px;
            font-size: 0.78em;
            background: rgba(96,165,250,0.08);
            color: var(--accent);
            border: 1px solid rgba(96,165,250,0.15);
        }

        .paper-authors {
            color: var(--text-secondary);
            font-size: 0.88em;
            margin-top: 8px;
        }

        .paper-abstract {
            color: var(--text-secondary);
            font-size: 0.92em;
            margin-top: 12px;
            line-height: 1.75;
        }
        .compact .paper-abstract {
            font-size: 0.86em;
            margin-top: 8px;
        }

        .paper-reasons {
            margin-top: 12px;
            padding: 10px 14px;
            background: rgba(52,211,153,0.06);
            border-left: 3px solid var(--accent-green);
            border-radius: 0 8px 8px 0;
            font-size: 0.88em;
            color: var(--accent-green);
        }

        .paper-links {
            margin-top: 14px;
            display: flex;
            gap: 10px;
        }
        .paper-links a {
            color: var(--accent);
            text-decoration: none;
            font-size: 0.86em;
            padding: 5px 14px;
            border: 1px solid var(--border);
            border-radius: 8px;
            transition: all 0.2s;
        }
        .paper-links a:hover {
            border-color: var(--accent);
            background: rgba(96,165,250,0.1);
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
        }
        .empty-icon {
            font-size: 3em;
            margin-bottom: 16px;
        }
        .empty-text {
            font-size: 1.2em;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }
        .empty-hint {
            font-size: 0.9em;
            color: var(--text-dim);
        }

        /* Footer */
        footer {
            text-align: center;
            padding: 40px 24px;
            border-top: 1px solid var(--border);
            margin-top: 60px;
            color: var(--text-dim);
            font-size: 0.82em;
        }
        .footer-content {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 4px;
        }
        .footer-sep {
            color: var(--border);
        }
        footer a { color: var(--accent); text-decoration: none; }

        /* Details/Summary */
        details {
            margin-top: 6px;
        }
        details summary {
            cursor: pointer;
            color: var(--text-dim);
            font-size: 0.85em;
            user-select: none;
        }
        details summary:hover {
            color: var(--text-secondary);
        }

        /* Responsive */
        @media (max-width: 640px) {
            .hero { padding: 40px 16px 20px; }
            .hero h1 { font-size: 1.7em; }
            .paper-list { padding: 0 12px; }
            .paper-card { padding: 16px; }
            .paper-title { font-size: 1.02em; }
            .top-nav { padding: 10px 12px; }
            .nav-brand { font-size: 1em; }
            .stats-row { gap: 10px; padding: 0 12px; }
            .stat-card { padding: 12px 18px; min-width: 90px; }
        }
    </style>
</head>
